name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: make check
        run: make check
      - name: timeout shim
        run: make test-timeout
      - name: smoke
        run: make smoke
      - name: make test
        run: make test
