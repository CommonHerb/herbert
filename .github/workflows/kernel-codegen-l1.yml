name: kernel-codegen-l1

# The far-axis silicon gate for the kernel-arc links. The native compiler's
# freestanding 32-bit Multiboot emit mode (selected by the "-- emit: multiboot32"
# directive) is graded NOT against the C reference but on a dual-substrate
# oracle: each emitted image must boot under BOTH QEMU (-kernel direct multiboot)
# and Bochs (GRUB on a partitioned HDD) and emit a runtime-computed byte that
# matches a HOST-DERIVED golden. This workflow is the authoritative run of the
# kernel-codegen link harnesses, with KERNEL_CODEGEN_REQUIRE_EMU=1 so a missing
# emulator is a hard failure, never a silent skip. `make test` keeps its
# emulator-free C-golden scope; this is the separate, emulator-graded kernel gate.
#
# Links gated here:
#   L1 = lingo  (link17): "boot and emit a byte" (literal * literal).
#   L2 = toakie (link18): first data-dependent branch on bare metal (control
#        flow + locals), plus a mutation proof that the dual-substrate gate bites.
#   L3 = zonday (link19): installs its own GDT+IDT and catches the CPU's own #DE
#        divide-error fault, vectoring to a compiled-Herbert handler, plus a
#        mutation proof that the fault-catch gate bites.
#   L4 = chosen (link20): turns on paging and proves a mapping by catching the
#        CPU's own #PF (page-fault, vector 14) on the deliberately-unmapped
#        neighbor, vectoring to a compiled-Herbert handler, plus a mutation
#        proof that the paging / #PF-catch gate bites.
#   L5 = link21 (fifth kernel-arc link): writes a page-table entry at a
#        RUNTIME-COMPUTED address (candidate (d), the first computed store),
#        mapping a build-time-unmapped page, then accesses it and the MMU
#        honors it; a broken store #PFs into a fail-closed IDT -> triple-fault.
#        Plus a mutation proof that the runtime-store / MMU-judge gate bites.
#   L6 = link22 (sixth kernel-arc link): DEMAND PAGING / iret-RESUMPTION --
#        touches an unmapped page, takes the CPU's own #PF, a handler maps the
#        page at runtime + flushes the TLB + drops the error code + iret, and the
#        faulting load RE-EXECUTES and reads a seeded frame (the first link whose
#        fault handler RESUMES). Plus a mutation proof that the resume gate bites.

on:
  push:
    branches:
      - main
      - l1-kernel-boot-emit

jobs:
  l1-dual-substrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install emulators + boot tooling (TEST dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            qemu-system-x86 \
            bochs bochs-x bochsbios vgabios \
            xvfb \
            grub-pc-bin grub-common \
            parted dosfstools
      - name: assert pinned emulator versions (far-axis -- a silent runner bump must go RED, not silently reshape the spec)
        run: |
          set -e
          q=$(dpkg-query -W -f='${Version}' qemu-system-x86)
          b=$(dpkg-query -W -f='${Version}' bochs)
          echo "qemu-system-x86=$q bochs=$b"
          qemu-system-x86_64 --version | head -1
          bochs --help 2>&1 | head -1 || true
          grub-install --version | head -1
          test "$q" = "1:8.2.2+ds-0ubuntu1.16" || { echo "QEMU version drift: got $q, pinned 1:8.2.2+ds-0ubuntu1.16 -- update the pin deliberately after re-validating the goldens"; exit 1; }
          test "$b" = "2.7+dfsg-4build5" || { echo "Bochs version drift: got $b, pinned 2.7+dfsg-4build5 -- update the pin deliberately after re-validating the goldens"; exit 1; }
      - name: build the C bootstrap (build/herbert)
        run: make build/herbert
      - name: L1 dual-substrate gate (lingo -- boot and emit a byte)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link17.sh
      - name: L2 dual-substrate gate (toakie -- data-dependent branch + locals)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L2_BOCHS_PROBES="merge_then merge_else return_then return_else" bash bootstrap/tests/run_native_codegen_link18.sh
      - name: L2 mutation proof (the dual-substrate gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link18_mutation.sh
      - name: L3 dual-substrate gate (zonday -- install GDT+IDT, catch the CPU's own #DE)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L3_BOCHS_PROBES="idt_then idt_else idt_lit" bash bootstrap/tests/run_native_codegen_link19.sh
      - name: L3 mutation proof (the fault-catch gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link19_mutation.sh
      - name: L4 dual-substrate gate (chosen -- turn on paging, catch the CPU's own #PF on the unmapped neighbor)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L4_BOCHS_PROBES="page_then page_else page_lit" bash bootstrap/tests/run_native_codegen_link20.sh
      - name: L4 mutation proof (the paging / #PF-catch gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link20_mutation.sh
      - name: L5 dual-substrate gate (write a PTE at a runtime-computed address; the MMU honors it)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L5_BOCHS_PROBES="store_then store_else store_lit" bash bootstrap/tests/run_native_codegen_link21.sh
      - name: L5 mutation proof (the runtime-store / MMU-judge gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link21_mutation.sh
      - name: L6 dual-substrate gate (demand paging -- map a faulting page at runtime and iret-resume)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L6_BOCHS_PROBES="demand_then demand_else demand_lit" bash bootstrap/tests/run_native_codegen_link22.sh
      - name: L6 mutation proof (the iret-resume / demand-paging gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link22_mutation.sh
      - name: L7 dual-substrate gate (first ASYNCHRONOUS interrupt -- remap PIC, program PIT, take the timer IRQ0 to a compiled-body handler)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L7_BOCHS_PROBES="timer_then timer_else timer_lit" bash bootstrap/tests/run_native_codegen_link23.sh
      - name: L7 mutation proof (the asynchronous-timer-IRQ gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link23_mutation.sh
      - name: L8 dual-substrate gate (talkert -- periodic timer, survive+repeat the async IRQ0 via EOI + iret-resume + count-to-N)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L8_BOCHS_PROBES="tick_then tick_else tick_lit" bash bootstrap/tests/run_native_codegen_link24.sh
      - name: L8 mutation proof (the periodic-timer / async-survival gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link24_mutation.sh
      - name: L9 dual-substrate gate (hoopteeter -- cross into 64-bit long mode and emit a 64-bit-only high-dword proof byte)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L9_BOCHS_PROBES="long_then long_else long_lit" bash bootstrap/tests/run_native_codegen_link25.sh
      - name: L9 mutation proof (the long-mode-entry gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link25_mutation.sh
      - name: L10 dual-substrate gate (toggler -- run a genuinely 64-bit COMPILED body, proof byte = the high dword of the body's own 64-bit result)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L10_BOCHS_PROBES="mul_add mul_big" bash bootstrap/tests/run_native_codegen_link26.sh
      - name: L10 mutation proof (the 64-bit-compiled-body gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link26_mutation.sh
      - name: L11 dual-substrate gate (rizzing -- a mainline task spins on a shared memory word the timer ISR bumps and emits only after surviving N async ticks)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L11_BOCHS_PROBES="rizz_then rizz_else" bash bootstrap/tests/run_native_codegen_link27.sh
      - name: L11 mutation proof (the shared-memory-tick synchronization gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link27_mutation.sh
      - name: L12 dual-substrate gate (bluefield -- preemptive context switch; the timer scheduler saves task A's full context, runs task B which clobbers it, restores A so its carried value survives)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L12_BOCHS_PROBES="bf_then bf_else" bash bootstrap/tests/run_native_codegen_link28.sh
      - name: L12 mutation proof (the preemptive-context-switch gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link28_mutation.sh
      - name: L13 dual-substrate gate (trikea / f2 -- widen the 64-bit subset to if/else + let rbp-frame locals; proof byte = high dword of the arm a genuine 64-bit cmp selects)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L13_BOCHS_PROBES="f2_else f2_then" bash bootstrap/tests/run_native_codegen_link29.sh
      - name: L13 mutation proof (the widened-64-bit-subset gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link29_mutation.sh
      - name: L14 dual-substrate gate (trukfit / f3 -- device input; a freestanding image reads one late-bound byte from COM1 via in al,dx and emits f(byte), same image fed X vs Y emits f(X) vs f(Y))
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L14_BOCHS_PROBES="f3_echo f3_inc" bash bootstrap/tests/run_native_codegen_link30.sh
      - name: L14 mutation proof (the device-input value-flow gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link30_mutation.sh
      - name: L15 dual-substrate gate (contigo / f1 -- first data-dependent scheduling decision; a freestanding image reads a late-bound COM1 byte into state and the timer-IRQ0 scheduler branches on it to dispatch one of two seeded tasks)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L15_BOCHS_PROBES="co_lit co_then" bash bootstrap/tests/run_native_codegen_link31.sh
      - name: L15 mutation proof (the data-dependent-scheduling value-flow gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link31_mutation.sh
      - name: L16 dual-substrate gate (cloggard -- first data-dependent MULTI-QUANTUM scheduler; a freestanding timer-IRQ0 run-queue dispatches K=4 WARM tasks over multiple quanta, recomputing next=(inq>>pos)&1 each quantum, so the same image fed X=0x0A emits schedule A,B,A,B and Y=0x05 emits B,A,B,A -- a different ordered trace)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L16_BOCHS_PROBES="cg_lit cg_then" bash bootstrap/tests/run_native_codegen_link32.sh
      - name: L16 mutation proof (the multi-quantum schedule + warmth-provenance gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link32_mutation.sh
      - name: L17 dual-substrate gate (lodger -- the PROGRAM-LIFECYCLE GERM; the kernel runs ONE build-unknown Multiboot module, discovers it via mbinfo, bump-allocates a stack page from the parsed memory map, indirect-calls its runtime entry, collects the answer; same kernel fed module X vs Y emits f(X) != f(Y), module at a DIFFERENT physical address on QEMU vs Bochs)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link33.sh
      - name: L17 mutation proof (the program-lifecycle + bump-allocator + module-witness gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link33_mutation.sh
      - name: L18 dual-substrate gate (trikonderoga -- the RING-3 PRIVILEGE BOUNDARY on the build-unknown module; the kernel runs the discovered module at CPL 3 on the bump-allocated page, a benign module exits via the DPL-3 int 0x30 syscall gate and the compiled body emits f(status), a hostile out 0xE9 faults a general-protection fault at CPL3 and the kernel dumps the CPU-authored ring-cross frame; same kernel fed X vs Y emits f(X) != f(Y))
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link34.sh
      - name: L18 mutation proof (ring-entry + syscall-exit-gate + privileged-op-isolation + resume-order + allocator-recompute gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link34_mutation.sh
      - name: L19 dual-substrate gate (nokta -- MEMORY ISOLATION via paging U S; the kernel runs the build-unknown module at CPL 3 UNDER PAGING with kernel pages Supervisor and the module pages User, so a hostile CPL3 write into kernel RAM faults a page fault errcode 7 CR2 the exact target CS RPL 3 and the write never lands, a hostile read faults errcode 5 confidentiality, a hostile page-table write faults tamper closure, a hostile out still general-protection-faults; benign wrote its own User page and exited via int 0x30, f(X) != f(Y))
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link35.sh
      - name: L19 mutation proof (the U S partition write/read/fetch/PDE/PT-page plus ring boundary under paging plus allocator gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link35_mutation.sh
      - name: L20 dual-substrate gate (sitopia -- the SYSCALL ROUND TRIP; the sandboxed module issues int 0x30 SYS_READ, the kernel at CPL0 polls and reads a late-bound COM1 byte the module cannot read itself (a module in al,dx general-protection-faults), irets back to CPL3 with the byte in eax (the first kernel to module re-entry), the module transforms it in its own code and SYS_EXITs, and the pure-conduit kernel body emits f(byte); same image fed X vs Y emits T(X) != T(Y))
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link36.sh
      - name: L20 mutation proof (the round-trip re-entry plus the two-byte differential vs a dead module plus the disasm body-scan plus the carried ring and paging isolation gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link36_mutation.sh
      - name: L21 dual-substrate gate (geeking -- THE KERNEL OUTLIVES ITS MODULE; with IF=1 at CPL3 a one-shot PIT plus a stale-IRR drain plus an RPL-keyed timer handler async-KILLS a runaway EB FE module via the first CPU-authored async ring-cross frame and CONTINUES to emit f(kill), and fault-to-continue names any CPL3 fault -- general-protection, page-fault, or the generalized debug, divide, invalid-opcode -- so the kernel survives instead of shutdown; a genuine no-errcode kernel fault still panics)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link37.sh
      - name: L21 mutation proof (the async-kill watchdog with stale-IRR drain plus the RPL-keyed handler plus the seeded IF plus the generalized fault-to-continue plus the carried round-trip ring and paging isolation gate must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link37_mutation.sh
      - name: L22 dual-substrate gate (coalgate -- THE KERNEL RUNS ITS FIRST HERBERT-COMPILED MODULE; a new emit mode compiles a Herbert source into a raw position-independent i386 module the frozen geeking kernel runs at ring 3, issuing int 0x30 SYS_READ for a late-bound byte and SYS_EXIT for its compiled transform; the same frozen kernel fed two different compiled modules emits different output, one module fed X vs Y emits T(X) != T(Y), and each emitted module is byte-identical to the STEP-0 target proven on QEMU plus Bochs plus KVM)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 bash bootstrap/tests/run_native_codegen_link38.sh
      - name: L22 mutation proof (the white-box byte-pin plus the answer-equals-transform check plus the two-byte X to Y differential plus the sys_read-exactly-once and module_byte-banned verifier rules must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link38_mutation.sh
      - name: L23 dual-substrate gate (ouroboros -- THE KERNEL RUNS A COMPILED RECURSIVE ALGORITHM; a new emit mode compiles a recursive multi-function Herbert program into a position-independent i386 module the frozen geeking kernel runs at ring 3, the module reads one byte via int 0x30 SYS_READ and returns its compiled recursive transform via SYS_EXIT through a backward recursive call rel32, the same frozen kernel fed different compiled algorithms tri and dbl and fact and chain emits different output, and each module is byte-identical to the STEP-0 target proven on QEMU plus Bochs plus KVM)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 L23_BOCHS_PROBES="tri fact" bash bootstrap/tests/run_native_codegen_link39.sh
      - name: L23 mutation proof (the white-box byte-pin plus the recursion-is-load-bearing checks echo-instead-of-recurse and base-case-flip and corrupted-backward-call-rel32 and const-bake plus the X to Y differential must bite)
        run: KERNEL_CODEGEN_REQUIRE_EMU=1 KERNEL_CODEGEN_MUTATION=1 bash bootstrap/tests/run_native_codegen_link39_mutation.sh
